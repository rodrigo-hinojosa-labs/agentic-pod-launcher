name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bats:
    name: bats tests/
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yq v4 (mikefarah)
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install bats-core
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.11.0 \
            https://github.com/bats-core/bats-core /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
          bats --version

      - name: Install age (for backup-identity encryption tests)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y age
          age --version
          age-keygen --help >/dev/null

      - name: Verify deps
        run: |
          set -euo pipefail
          bash --version | head -1
          bats --version
          yq --version
          jq --version
          git --version
          tmux -V
          age --version

      - name: Run bats suite
        run: bats --print-output-on-failure tests/
