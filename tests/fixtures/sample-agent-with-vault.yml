version: 1
agent:
  name: dockbot
  display_name: "DockBot 🐳"
  role: "test agent for docker mode"
  vibe: "terse"
  use_default_principles: true
user:
  name: "Alice Example"
  nickname: "Alice"
  timezone: "UTC"
  email: "alice@example.com"
  language: "en"
deployment:
  host: "testhost"
  workspace: "/home/test/agents/dockbot"
  install_service: true
  claude_cli: "claude"
  mode: docker
docker:
  image_tag: "agent-admin:latest"
  uid: 1000
  gid: 1000
  state_volume: "dockbot-state"
  base_image: "alpine:3.24.1"
  claude_code_version: "2.1.170"
  uv_version: "0.11.22"
  bun_version: "1.3.14"
  gum_version: "0.17.0"
claude:
  config_dir: "/home/agent/.claude"
  profile_new: true
notifications:
  channel: telegram
features:
  heartbeat:
    enabled: true
    interval: "30m"
    timeout: 300
    retries: 1
    default_prompt: "Status check — return a short plain-text report (uptime, notable issues). No tool use; your stdout is forwarded verbatim to the notifier."
mcps:
  defaults:
    - fetch
    - git
    - filesystem
  atlassian:
    - name: work
      url: "https://work.atlassian.net"
      email: "alice@work.com"
    - name: personal
      url: "https://personal.atlassian.net"
      email: "alice@personal.com"
  github:
    enabled: false
    email: ""
plugins:
  - telegram@claude-plugins-official
vault:
  enabled: true
  path: .state/.vault
  seed_skeleton: true
  force_reseed: false
  initial_sources: []
  mcp:
    enabled: true
    server: vault
  qmd:
    enabled: false
    version: "2.5.3"
    schedule: "*/5 * * * *"
  schema:
    frontmatter_required: true
    log_format: "## [{date}] {op} | {title}"
